    // ==================== BASE DE DATOS ====================
    class Database {
      constructor() {
        this.db = null;
        this.images = new Map();
      }
      init() {
        const stored = localStorage.getItem('ods_data');
        this.db = stored ? JSON.parse(stored) : { orders: [], counter: 1 };
        const storedImages = localStorage.getItem('ods_images');
        if (storedImages) {
          this.images = new Map(JSON.parse(storedImages));
        }
      }
      save() {
        localStorage.setItem('ods_data', JSON.stringify(this.db));
      }
      getAllOrders() {
        return this.db.orders;
      }
      getOrder(id) {
        return this.db.orders.find(o => o.id === id);
      }
      createOrder(order) {
        const newOrder = Object.assign({}, order, { id: this.db.counter++ });
        this.db.orders.push(newOrder);
        this.save();
        return newOrder;
      }
      updateOrder(id, data) {
        const idx = this.db.orders.findIndex(o => o.id === id);
        if (idx !== -1) {
          this.db.orders[idx] = Object.assign({}, this.db.orders[idx], data);
          this.save();
          return this.db.orders[idx];
        }
        return null;
      }
      deleteOrder(id) {
        const order = this.getOrder(id);
        if (order && order.images) {
          Object.keys(order.images).forEach(key => {
            (order.images[key] || []).forEach(imgId => this.images.delete(imgId));
          });
        }
        this.db.orders = this.db.orders.filter(o => o.id !== id);
        this.save();
      }
      duplicateOrder(id) {
        const original = this.getOrder(id);
        if (!original) return null;
        const newOrder = Object.assign({}, original, { id: this.db.counter++ });
        delete newOrder.firmaCliente;
        delete newOrder.firmaIngeniero;
        if (original.images) {
          newOrder.images = {};
          Object.keys(original.images).forEach(key => {
            newOrder.images[key] = original.images[key].map(imgId => {
              const imgData = this.images.get(imgId);
              if (imgData) {
                const newId = 'img_' + Date.now() + '_' + Math.random();
                this.images.set(newId, imgData);
                return newId;
              }
              return null;
            }).filter(Boolean);
          });
        }
        this.db.orders.push(newOrder);
        this.save();
        return newOrder;
      }
      saveImage(id, data) {
        this.images.set(id, data);
        this.save();
      }
      getImage(id) {
        // Primero buscar en cache temporal en memoria (para imágenes de nube, no persiste en localStorage)
        if (window._tmpImgCache && window._tmpImgCache.has(id)) {
          return window._tmpImgCache.get(id);
        }
        return this.images.get(id);
      }
    }

        style.textContent = `
          @keyframes fadeInOut {
            0%   { opacity: 0; transform: translateY(10px); }
            15%  { opacity: 1; transform: translateY(0); }
            75%  { opacity: 1; }

      setTimeout(() => toast.remove(), 3600);

    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 800;
            const scale = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    // ==================== APP STATE ====================
    class AppState {
      constructor() {
        this.view = 'list';
        this.orders = [];
        this.currentOrder = null;
        this.search = '';
        this.tab = 'general';
        this.listeners = [];
        // Supabase cloud view state
        this.cloudOrders = [];
        this.cloudSearch = '';
        this.cloudLoading = false;
        this.cloudPage = 0;
        this.cloudPageSize = 20;
        this.cloudTotal = 0;
      }
      setState(newState) {
        Object.assign(this, newState);
        this.notify();
      }
      subscribe(listener) {
        this.listeners.push(listener);
      }
      notify() {
        this.listeners.forEach(listener => listener());
      }
    }
    const appState = new AppState();
    // ==================== FUNCIONES DE NEGOCIO ====================
    function loadOrders() {
      appState.setState({ orders: db.getAllOrders() });
    }
    function createNewOrder() {
      const order = {
        numeroTicket: '',
        fechaAtencion: new Date().toISOString().split('T')[0],
        ingeniero: '',
        cliente: '',
        ubicacion: '',
        direccion: '',
        contacto: '',
        cargo: '',
        telefono: '',
        correo: '',
        incidencia: '',
        tipoServicio: '',
        fechaCreacion: new Date().toISOString().split('T')[0],
        nombreTerminal: '',
        solicitaTerminal: false,
        modeloTerminal: '',
        serieRetirada: '',
        macRetirada: '',
        fallaRetirada: '',
        serieInstalada: '',
        macInstalada: '',
        solucion: '',
        comentario: '',
        images: { inicial: [], mediciones: [], instalacion: [], extras: [] },
        entregas: { materiales: []},
        firmaCliente: null,
        firmaIngeniero: null
      };
      appState.setState({ currentOrder: order, view: 'form', tab: 'general' });
    }
    function editOrder(order) {
      appState.setState({ currentOrder: order, view: 'form', tab: 'general' });
    }
    function duplicateOrder(id) {
      const duplicated = db.duplicateOrder(id);
      if (duplicated) {
        loadOrders();
        alert('ODS duplicada exitosamente');
      }
    }
    function deleteOrder(id) {
      if (confirm('¿Eliminar esta ODS?')) {
        db.deleteOrder(id);
        loadOrders();
      }
    }
    function saveOrder() {
      if (appState.currentOrder.id) {
        db.updateOrder(appState.currentOrder.id, appState.currentOrder);
      } else {
        db.createOrder(appState.currentOrder);
      }
      loadOrders();
      appState.setState({ view: 'list' });
    }
    function updateField(field, value) {
      if (!appState.currentOrder) return;
      appState.currentOrder[field] = value;
      // No re-renderizar, solo actualizar el valor en memoria
    }
    function addImage(category, imgId, remove) {
      const images = appState.currentOrder.images;
      if (!images[category]) images[category] = [];
      if (remove) {
        images[category] = images[category].filter(id => id !== imgId);
      } else {
        images[category].push(imgId);
      }
      // Re-renderizar solo la sección de imágenes
      const tabContent = document.getElementById('tab-content');
      if (tabContent && appState.tab === 'evidencias') {
        tabContent.innerHTML = renderTabContent();
      }
    }
    async function handleImageUpload(category, files) {
      for (const file of files) {
        const compressed = await compressImage(file);
        const id = 'img_' + Date.now() + '_' + Math.random();
        db.saveImage(id, compressed);
        addImage(category, id, false);
      }
    }

      // Helper: subir un archivo base64 a Supabase Storage y devolver URL pública
      async function supabaseUploadImage(base64Data, path) {
        // Convertir base64 → Blob
        const [meta, data] = base64Data.split(',');
        const mime = meta.match(/:(.*?);/)[1];
        const binary = atob(data);
        const arr = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
        const blob = new Blob([arr], { type: mime });

        // Subir al bucket
        const uploadRes = await fetch(
          `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${path}`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': mime,
              'x-upsert': 'true'
            },
            body: blob
          }
        );
        if (!uploadRes.ok) {
          const err = await uploadRes.text();
          throw new Error(`Storage upload failed [${path}]: ${err}`);
        }
        // Devolver URL pública
        return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${path}`;
      }

              const ext  = base64.startsWith('data:image/png') ? 'png' : 'jpg';
              const path = `${prefix}/${categoria}_${i + 1}.${ext}`;
              const url  = await supabaseUploadImage(base64, path);
              urls.push({ orden: i + 1, url });
            }
            return urls;
          }

          const [urlsInicial, urlsMediciones, urlsInstalacion, urlsExtras] = await Promise.all([

            direccion:         order.direccion      || null,
            contacto:          order.contacto       || null,

            correo:            order.correo         || null,

            // Terminal

            solicita_terminal: order.solicitaTerminal || false,
            modelo_terminal:   order.modeloTerminal  || null,

            // Terminal retirada
            serie_retirada:    order.serieRetirada  || null,
            mac_retirada:      order.macRetirada    || null,
            falla_retirada:    order.fallaRetirada  || null,

            // Terminal instalada
            serie_instalada:   order.serieInstalada || null,
            mac_instalada:     order.macInstalada   || null,

            // Solución
            solucion:          order.solucion       || null,
            comentario:        order.comentario     || null,

            // Evidencias (URLs públicas de Storage)
            imagenes: {
              inicial:     urlsInicial,
              mediciones:  urlsMediciones,
              instalacion: urlsInstalacion,
              extras:      urlsExtras
            },
            total_imagenes: urlsInicial.length + urlsMediciones.length +
                            urlsInstalacion.length + urlsExtras.length,

            // Entregas / Materiales
            entregas:          order.entregas && order.entregas.materiales ? order.entregas.materiales : [],

            // Firmas (URLs públicas de Storage)
            firma_cliente:    urlFirmaCliente,
            firma_ingeniero:  urlFirmaIngeniero,
            tiene_firma_cliente:    !!urlFirmaCliente,
            tiene_firma_ingeniero:  !!urlFirmaIngeniero
          };

          // ── 4. Insertar registro en tabla `ods` de Supabase ──────────────
          const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/ods`, {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'apikey':         SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Prefer':        'return=representation'
            },
            body: JSON.stringify(odsJson)
          });

          if (!insertRes.ok) {
            const errText = await insertRes.text();
            throw new Error(`DB insert failed: ${errText}`);
          }

          const saved = await insertRes.json();
          console.log('✅ ODS guardada la Nube:', saved);

        } catch (err) {

            console.warn(`📦 Registro en cola local (${pendientes.length} pendiente/s)`);
          } catch (e) { /* ignorar */ }
        }
      })();

        agregarFirmaAlPie();
      }

      const fileName = 'IDT_' + (order.numeroTicket || 'Ticket') + '_' + (order.cliente || 'Cliente') + '_' + (order.ubicacion || 'Sitio') + '.pdf';
      pdf.save(fileName);
      const blobUrl = pdf.output('bloburl');

      // ==================== GUARDAR EN SUPABASE ====================
      // Credenciales tomadas de la configuración global (ver inicio del script)
      const SUPABASE_URL = window._SUPA_URL;
      const SUPABASE_KEY = window._SUPA_KEY;
      const BUCKET_NAME  = window._SUPA_BUCKET;

      // Helper: subir un archivo base64 a Supabase Storage y devolver URL pública
      async function supabaseUploadImage(base64Data, path) {
        // Convertir base64 → Blob
        const [meta, data] = base64Data.split(',');
        const mime = meta.match(/:(.*?);/)[1];
        const binary = atob(data);
        const arr = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
        const blob = new Blob([arr], { type: mime });

        // Subir al bucket
        const uploadRes = await fetch(
          `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${path}`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': mime,
              'x-upsert': 'true'
            },
            body: blob
          }
        );
        if (!uploadRes.ok) {
          const err = await uploadRes.text();
          throw new Error(`Storage upload failed [${path}]: ${err}`);
        }
        // Devolver URL pública
        return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${path}`;
      }

      (async () => {
        try {
          showToast('☁️ Sincronizando IDT con la Nube…', '#3b82f6');

          const ticketSlug = (order.numeroTicket || order.id || Date.now()).toString().replace(/\s+/g, '_');
          const prefix     = `ods/${ticketSlug}`;

          // ── 1. Subir imágenes de evidencias y obtener URLs ──────────────
          async function subirCategoria(categoria) {
            const ids = order.images?.[categoria] || [];
            const urls = [];
            for (let i = 0; i < ids.length; i++) {
              const base64 = db.getImage(ids[i]);
              if (!base64) continue;
              const ext  = base64.startsWith('data:image/png') ? 'png' : 'jpg';
              const path = `${prefix}/${categoria}_${i + 1}.${ext}`;
              const url  = await supabaseUploadImage(base64, path);
              urls.push({ orden: i + 1, url });
            }
            return urls;
          }

          const [urlsInicial, urlsMediciones, urlsInstalacion, urlsExtras] = await Promise.all([
            subirCategoria('inicial'),
            subirCategoria('mediciones'),
            subirCategoria('instalacion'),
            subirCategoria('extras')
          ]);

          // ── 2. Subir firmas ──────────────────────────────────────────────
          let urlFirmaCliente   = null;
          let urlFirmaIngeniero = null;

          if (order.firmaCliente) {
            urlFirmaCliente = await supabaseUploadImage(
              order.firmaCliente, `${prefix}/firma_cliente.png`
            );
          }
          if (order.firmaIngeniero) {
            urlFirmaIngeniero = await supabaseUploadImage(
              order.firmaIngeniero, `${prefix}/firma_ingeniero.png`
            );
          }

          // ── 3. Construir JSON limpio para la tabla `ods` ─────────────────
          const odsJson = {
            // Metadatos
            generado_en:  new Date().toISOString(),
            archivo_pdf:  fileName,

            // Generales
            local_id:          order.id            || null,
            numero_ticket:     order.numeroTicket  || null,
            fecha_atencion:    order.fechaAtencion  || null,
            fecha_creacion:    order.fechaCreacion  || null,
            ingeniero:         order.ingeniero      || null,
            tipo_servicio:     order.tipoServicio   || null,
            incidencia:        order.incidencia     || null,

            // Cliente / Sitio
            cliente:           order.cliente        || null,
            ubicacion:         order.ubicacion      || null,
            direccion:         order.direccion      || null,
            contacto:          order.contacto       || null,
            cargo:             order.cargo          || null,
            telefono:          order.telefono       || null,
            correo:            order.correo         || null,

            // Terminal
            nombre_terminal:   order.nombreTerminal  || null,
            solicita_terminal: order.solicitaTerminal || false,
            modelo_terminal:   order.modeloTerminal  || null,

            // Terminal retirada
            serie_retirada:    order.serieRetirada  || null,
            mac_retirada:      order.macRetirada    || null,
            falla_retirada:    order.fallaRetirada  || null,

            // Terminal instalada
            serie_instalada:   order.serieInstalada || null,
            mac_instalada:     order.macInstalada   || null,

            // Solución
            solucion:          order.solucion       || null,
            comentario:        order.comentario     || null,
            
            // Entrega de Materiales
            entregas:          order.entregas       || null,

            // Evidencias (URLs públicas de Storage)
            imagenes: {
              inicial:     urlsInicial,
              mediciones:  urlsMediciones,
              instalacion: urlsInstalacion,
              extras:      urlsExtras
            },
            total_imagenes: urlsInicial.length + urlsMediciones.length +
                            urlsInstalacion.length + urlsExtras.length,

            // Entregas / Materiales
            entregas:          order.entregas && order.entregas.materiales ? order.entregas.materiales : [],

            // Firmas (URLs públicas de Storage)
            firma_cliente:    urlFirmaCliente,
            firma_ingeniero:  urlFirmaIngeniero,
            tiene_firma_cliente:    !!urlFirmaCliente,
            tiene_firma_ingeniero:  !!urlFirmaIngeniero
          };

          // ── 4. Insertar registro en tabla `ods` de Supabase ──────────────
          const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/ods`, {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'apikey':         SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Prefer':        'return=representation'
            },
            body: JSON.stringify(odsJson)
          });

          if (!insertRes.ok) {
            const errText = await insertRes.text();
            throw new Error(`DB insert failed: ${errText}`);
          }

          const saved = await insertRes.json();
          console.log('✅ IDT guardada la Nube:', saved);
          showToast('✅ IDT sincronizada con la Nube');

        } catch (err) {
          console.error('❌ Error al sincronizar con la Nube:', err);
          showToast('⚠️ Error al sincronizar con la Nube (ver consola)', '#ef4444');
          // Cola de reintentos local
          try {
            const pendientes = JSON.parse(localStorage.getItem('ods_pendientes_sync') || '[]');
            pendientes.push({
              order_id:  order.id,
              ticket:    order.numeroTicket,
              timestamp: new Date().toISOString(),
              error:     err.message
            });
            localStorage.setItem('ods_pendientes_sync', JSON.stringify(pendientes));
            console.warn(`📦 Registro en cola local (${pendientes.length} pendiente/s)`);
          } catch (e) { /* ignorar */ }
        }
      })();
      // ==================== FIN GUARDAR EN SUPABASE ====================

      window.open(blobUrl, '_blank');

    }

      function agregarTextoAutoajustable(doc, text, x, y, maxWidth, maxFontSize = 16, justif = 'left') {
          const currentSize = doc.internal.getFontSize();
          let fontSize = maxFontSize;
          let Justificado = justif;
          doc.setFontSize(fontSize);
          
          // Decrease font size until the text width fits maxWidth
          while ((doc.getStringUnitWidth(text) * fontSize) / doc.internal.scaleFactor > maxWidth && fontSize > 1) {
            fontSize--;
            doc.setFontSize(fontSize);
          }
            
          doc.text(text, x, y, { align: Justificado });
          doc.setFontSize(currentSize);

      }

      yPos += saltoLineaDoble;
      let consta1 = "Por medio de la presente se hace constar que la empresa  ";
      let empresa = "IBServices";
      let consta2 = " entregó el material que a continuación se describe:"
      // Tabla de entregas

      let startX = (pdf.getStringUnitWidth(consta1) * tipoDato / pdf.internal.scaleFactor);

      pdf.text(empresa, xPosA + startX, yPos, { maxWidth: (xPosG - xPosA), align: 'justify' });
      startX += (pdf.getStringUnitWidth(empresa) * tipoDato / pdf.internal.scaleFactor);
      pdf.setFont("helvetica", "normal");
      pdf.text(consta2, xPosA + startX, yPos);
      const rowHeight = 8;
      const headerH  = rowHeight + 2;

      pdf.setFontSize(tipoDato);
      pdf.setFillColor(...colorAzulOscuro);
      pdf.rect(xPosA, yPos, (xPosG - xPosA), rowHeight, 'F');
      setBlanco(pdf);
      pdf.text('#', ColumnaItem, yPos + 5, { align: 'left' });
      pdf.text('Cant.', ColumnaCant, yPos + 5, { align: 'left' });
      pdf.text('Marca', ColumnaMarca, yPos + 5, { align: 'left' });
      pdf.text('Modelo', ColumnaModelo, yPos + 5, { align: 'left' });
      pdf.text('N° Serie', ColumnaSerie, yPos + 5, { align: 'left' });
      pdf.text('Observaciones', ColumnaObservaciones, yPos + 5, { align: 'left' });
      yPos += 10;
      yHeaderTabla = yPos -2;              
      
      const materiales = (order.entregas && order.entregas.materiales) ? order.entregas.materiales : [];
      // Anchos de columnas (suma = colRight - margin)
      const tableWidth = colRight - margin;
      const colWidths = {
        cant:  tableWidth * 0.10,
        marca: tableWidth * 0.20,
        modelo:tableWidth * 0.22,
        serie: tableWidth * 0.22,
        obs:   tableWidth * 0.26,
      };
      const colX = {
        cant:  margin,
        marca: margin + colWidths.cant,
        modelo:margin + colWidths.cant + colWidths.marca,
        serie: margin + colWidths.cant + colWidths.marca + colWidths.modelo,
        obs:   margin + colWidths.cant + colWidths.marca + colWidths.modelo + colWidths.serie,
      };


      if (materiales.length === 0) {
        // Fila vacía de aviso
        pdf.setTextColor(150, 150, 150);
        pdf.setFontSize(tipoDato);
        pdf.setDrawColor(220, 220, 220);
        pdf.rect(margin, yPos, tableWidth, rowHeight);
        pdf.text('Sin materiales entregados', centerX, yPos + rowHeight / 2 + 1.5, { align: 'center' });
        yPos += rowHeight;
      } else {
        pdf.setFontSize(tipoRenglones);
          var altoRenglon = 1;
          setGris(pdf);

        materiales.forEach((item, idx) => {
          // Verificar si necesitamos nueva página
          if (yPos + rowHeight > altoLetter - 50) {
            agregarPie(paginaActual);
            pdf.addPage();
            paginaActual++;
            totalPaginas++;
            pdf.setPage(paginaActual);
            yPos = 20;
            // Re-dibujar encabezado de tabla en nueva página
            pdf.setFillColor(0, 87, 130);
            pdf.setTextColor(255, 255, 255);
            pdf.rect(margin, yPos, tableWidth, headerH, 'F');
            pdf.setFont(undefined, 'bold');
            const hY2 = yPos + headerH / 2 + 1.5;
            pdf.text('Cant.',   colX.cant   + colWidths.cant   / 2, hY2, { align: 'center' });
            pdf.text('Marca',   colX.marca  + colWidths.marca  / 2, hY2, { align: 'center' });
            pdf.text('Modelo',  colX.modelo + colWidths.modelo / 2, hY2, { align: 'center' });
            pdf.text('N° Serie',colX.serie  + colWidths.serie  / 2, hY2, { align: 'center' });
            pdf.text('Observaciones', colX.obs + colWidths.obs / 2, hY2, { align: 'center' });
            pdf.setFont(undefined, 'normal');
            yPos += headerH;
          }

          const fillColor = idx % 2 === 0 ? [255, 255, 255] : [240, 248, 255];
          pdf.setFillColor(...fillColor);
          pdf.setDrawColor(200, 200, 200);
          pdf.rect(anchoLetter + margin, yPos, (xPosG - xPosA), rowHeight, 'F');

          const cellY = yPos + rowHeight / 2 + 1.5;
          setGris(pdf);
          pdf.text(String(idx + 1),  ColumnaItem, yPos + 5, { align: 'left' });
          setNegro(pdf);
          pdf.text(String(item.cantidad || 1),  ColumnaCant + 3, yPos + 5, { align: 'center' });
//          pdf.text(item.marca  || '—', ColumnaMarca, yPos + 5, { align: 'left' });
          agregarTextoAutoajustable(pdf, (item.marca || '—'), ColumnaMarca, yPos + 5, ((ColumnaModelo - ColumnaMarca)), tipoRenglones, 'left');    

          pdf.text(item.modelo || '—', ColumnaModelo, yPos + 5, { align: 'left' });
          pdf.text(item.serie  || '—', ColumnaSerie, yPos + 5, { align: 'left' });
  
          agregarTextoAutoajustable(pdf, (item.observaciones || '—'), ColumnaObservaciones, yPos + 5, ((xPosG-(ColumnaObservaciones))), tipoRenglones, 'left');    
          pdf.setLineWidth(0.2);
          pdf.line((xPosA), yPos + rowHeight + 1, (xPosG), yPos + rowHeight + 1, 'S')
          yPos += rowHeight;
        });
      }

























///////////////////////////////////////////////////////////////////////




      // ── Tabla de materiales ──────────────────────────────────────────
      pdf.setFontSize(tipoSubtitulo);
      setAzulOscuro(pdf);

//      const materiales = (order.entregas && order.entregas.materiales) ? order.entregas.materiales : [];



      // Total de ítems
      yPos += saltoSenc;
      pdf.setFontSize(tipoDato);
      setGris(pdf);
      pdf.text(`Total de materiales: ${materiales.length}`, ColumnaItem, yPos, { align: 'left' });
      yPos += saltoDoble;

      // ── Observaciones generales ──────────────────────────────────────
      if (order.comentario) {
        pdf.setFontSize(tipoSubtitulo);
        setAzulOscuro(pdf);
//        pdf.text('Observaciones', margin, yPos);
        yPos += saltoSenc;
        pdf.setFontSize(tipoDato);
        setNegro(pdf);
        const obsLines = pdf.splitTextToSize(order.comentario, tableWidth);
//        pdf.text(obsLines, margin, yPos);
        yPos += obsLines.length * saltoSenc + saltoMin;
      }

      // ── Pie en todas las páginas ─────────────────────────────────────
      const pageCount = pdf.internal.getNumberOfPages();
      totalPaginas = pageCount;
      for (let i = 1; i <= pageCount; i++) {
        pdf.setPage(i);
        agregarPie(i);
      }

      // ── Guardar y abrir ──────────────────────────────────────────────
      const fileName = 'CDE_' + (order.numeroTicket || order.id) + '.pdf';
      pdf.save(fileName);
      const blobUrl = pdf.output('bloburl');

      // ── Sincronizar con Supabase ─────────────────────────────────────
      const SUPABASE_URL = window._SUPA_URL;
      const SUPABASE_KEY = window._SUPA_KEY;

      (async () => {
        try {
          showToast('☁️ Sincronizando CDE con la Nube…', '#3b82f6');

          const ticketSlug = (order.numeroTicket || order.id || Date.now())
            .toString().replace(/\s+/g, '_');

          const odsJson = {
            generado_en:    new Date().toISOString(),
            archivo_pdf:    fileName,
            local_id:       order.id           || null,
            numero_ticket:  order.numeroTicket || null,
            fecha_atencion: order.fechaAtencion|| null,
            ingeniero:      order.ingeniero    || null,
            cliente:        order.cliente      || null,
            ubicacion:      order.ubicacion    || null,
            direccion:      order.direccion    || null,
            contacto:       order.contacto     || null,
            cargo:          order.cargo        || null,
            telefono:       order.telefono     || null,
            correo:         order.correo       || null,
            solucion:       order.solucion     || null,
            comentario:     order.comentario   || null,

            // Entregas / Materiales
            entregas: order.entregas && order.entregas.materiales
              ? order.entregas.materiales : [],

            // Firmas (URLs públicas de Storage)
            firma_cliente:          null,
            firma_ingeniero:        null,
            tiene_firma_cliente:    false,
            tiene_firma_ingeniero:  false
          };

          const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/ods`, {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'apikey':         SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Prefer':        'return=representation'
            },
            body: JSON.stringify(odsJson)
          });

          if (!insertRes.ok) {
            const errText = await insertRes.text();
            throw new Error(`DB insert failed: ${errText}`);
          }
          const saved = await insertRes.json();
          console.log('✅ CDE guardado en la Nube:', saved);
          showToast('✅ CDE sincronizado con la Nube');

        } catch (err) {
          console.error('❌ Error al sincronizar CDE:', err);
          showToast('⚠️ Error al sincronizar CDE (ver consola)', '#ef4444');
          try {
            const pendientes = JSON.parse(
              localStorage.getItem('ods_pendientes_sync') || '[]'
            );
            pendientes.push({
              order_id:  order.id,
              ticket:    order.numeroTicket,
              timestamp: new Date().toISOString(),
              error:     err.message
            });
            localStorage.setItem('ods_pendientes_sync', JSON.stringify(pendientes));
          } catch (e) { /* ignorar */ }
        }
      })();

      window.open(blobUrl, '_blank');
    }

        }
        // Mouse events
        canvasCliente.addEventListener('mousedown', (e) => startDrawing(e, 'cliente'));
        canvasCliente.addEventListener('mousemove', (e) => draw(e, 'cliente'));
        canvasCliente.addEventListener('mouseup', () => stopDrawing('cliente'));
        canvasCliente.addEventListener('mouseleave', () => stopDrawing('cliente'));
        // Touch events para móvil
        canvasCliente.addEventListener('touchstart', (e) => {

    function getCanvasCoords(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }
    function startDrawing(e, tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;
      if (tipo === 'ingeniero') isDrawingIngeniero = true;
      else isDrawingCliente = true;
      const coords = getCanvasCoords(e, canvas);
      ctx.beginPath();
      ctx.moveTo(coords.x, coords.y);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#000';
    }
    function draw(e, tipo) {
      const isDrawing = tipo === 'ingeniero' ? isDrawingIngeniero : isDrawingCliente;
      if (!isDrawing) return;
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;
      const coords = getCanvasCoords(e, canvas);
      ctx.lineTo(coords.x, coords.y);
      ctx.stroke();
    }
    function stopDrawing(tipo) {
      if (tipo === 'ingeniero') isDrawingIngeniero = false;
      else isDrawingCliente = false;
    }
    function clearSignature(tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    function saveSignature(tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const dataUrl = canvas.toDataURL();
      const field = tipo === 'ingeniero' ? 'firmaIngeniero' : 'firmaCliente';
      appState.currentOrder[field] = dataUrl;
      alert('Firma ' + (tipo === 'ingeniero' ? 'del ingeniero' : 'del cliente') + ' guardada');
    }
    function loadSignatureFromFile(tipo, input) {
      const file = input.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
          const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;
          
          // Limpiar canvas
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Calcular dimensiones para ajustar imagen manteniendo aspecto
          const canvasAspect = canvas.width / canvas.height;
          const imgAspect = img.width / img.height;
          
          let drawWidth, drawHeight, offsetX, offsetY;
          
          if (imgAspect > canvasAspect) {
            // Imagen más ancha - ajustar al ancho
            drawWidth = canvas.width;
            drawHeight = canvas.width / imgAspect;
            offsetX = 0;
            offsetY = (canvas.height - drawHeight) / 2;
          } else {
            // Imagen más alta - ajustar a la altura
            drawHeight = canvas.height;
            drawWidth = canvas.height * imgAspect;
            offsetX = (canvas.width - drawWidth) / 2;
            offsetY = 0;
          }
          
          // Dibujar imagen centrada
          ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
          
          // Guardar automáticamente
          const dataUrl = canvas.toDataURL();
          const field = tipo === 'ingeniero' ? 'firmaIngeniero' : 'firmaCliente';
          appState.currentOrder[field] = dataUrl;
          
          alert('Firma cargada desde archivo');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      
      // Limpiar input para permitir cargar la misma imagen nuevamente
      input.value = '';
    }

    function importData(input) {
      const file = input.files[0];
      if (!file) return;
      
      if (!confirm('¿Importar datos? Esto REEMPLAZARÁ todos los datos actuales. ¿Continuar?')) {
        input.value = '';
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          
          // Validar estructura
          if (!importedData.data || !importedData.data.orders) {
            throw new Error('Formato de archivo inválido');
          }
          
          // Restaurar datos
          db.db.orders = importedData.data.orders;
          db.db.counter = importedData.data.counter;
          db.images = new Map(importedData.data.images);
          
          // Guardar en localStorage
          db.save();
          
          // Recargar vista
          loadOrders();
          
          alert(`Datos importados exitosamente\n${importedData.data.orders.length} órdenes restauradas`);
        } catch (error) {
          console.error('Error al importar:', error);
          alert('Error al importar los datos. Verifica que el archivo sea válido.');
        }
      };
      
      reader.readAsText(file);
      
      // Limpiar input
      input.value = '';
    }
    
    function mergeData(input) {
      const file = input.files[0];
      if (!file) return;
      
      if (!confirm('¿Combinar datos? Esto AÑADIRÁ las órdenes del archivo a las existentes. ¿Continuar?')) {
        input.value = '';
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          
          // Validar estructura
          if (!importedData.data || !importedData.data.orders) {
            throw new Error('Formato de archivo inválido');
          }
          
          // Obtener el counter actual
          let maxId = db.db.counter;
          
          // Añadir órdenes con nuevos IDs
          const addedOrders = [];
          importedData.data.orders.forEach(order => {
            const newOrder = { ...order, id: maxId++ };
            db.db.orders.push(newOrder);
            addedOrders.push(newOrder);
          });
          
          // Actualizar counter
          db.db.counter = maxId;
          
          // Combinar imágenes
          const importedImages = new Map(importedData.data.images);
          importedImages.forEach((value, key) => {
            db.images.set(key, value);
          });
          
          // Guardar
          db.save();
          
          // Recargar vista
          loadOrders();
          
          alert(`Datos combinados exitosamente\n${addedOrders.length} órdenes añadidas`);
        } catch (error) {
          console.error('Error al combinar:', error);
          alert('Error al combinar los datos. Verifica que el archivo sea válido.');
        }
      };
      
      reader.readAsText(file);
      
      // Limpiar input
      input.value = '';
    }
    
    // ==================== SUPABASE CLOUD CRUD ====================

    function getSupabaseCreds() {
      // Lee las mismas constantes definidas dentro de generatePDF
      // Las exponemos globalmente aquí para reutilizarlas
      return {
        url: window._SUPA_URL || '',
        key: window._SUPA_KEY || ''
      };
    }

    // Inyectar credenciales globales (se setean la primera vez que generatePDF corre,
    // pero también las guardamos al abrir la vista nube)
    function ensureSupaCreds() {
      // Las credenciales ya están en window._SUPA_URL / _SUPA_KEY definidas al inicio
    }

    async function cloudFetch(path, opts = {}) {
      ensureSupaCreds();
      const { url, key } = getSupabaseCreds();
      if (!url || url.includes('TU_PROYECTO')) throw new Error('Falta SUPABASE_URL: edita window._SUPA_URL en el script');
      if (!key || key === 'TU_ANON_KEY') throw new Error('Falta SUPABASE_KEY: edita window._SUPA_KEY en el script');
      return fetch(`${url}${path}`, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'apikey': key,
          'Authorization': `Bearer ${key}`,
          ...(opts.headers || {})
        }
      });
    }

    async function loadCloudOrders() {
      appState.setState({ cloudLoading: true });
      try {
        const search = appState.cloudSearch.trim();
        const from = appState.cloudPage * appState.cloudPageSize;
        const to   = from + appState.cloudPageSize - 1;

        let filter = '';
        if (search) {
          filter = `&or=(numero_ticket.ilike.*${encodeURIComponent(search)}*,cliente.ilike.*${encodeURIComponent(search)}*,ingeniero.ilike.*${encodeURIComponent(search)}*)`;
        }

        const res = await cloudFetch(
          `/rest/v1/ods?select=*&order=created_at.desc&offset=${from}&limit=${appState.cloudPageSize}${filter}`,
          { headers: { 'Range-Unit': 'items', 'Range': `${from}-${to}`, 'Prefer': 'count=exact' } }
        );

        if (!res.ok) throw new Error(await res.text());

        const total = parseInt(res.headers.get('Content-Range')?.split('/')[1] || '0');
        const data  = await res.json();

        appState.cloudOrders = data;
        appState.cloudTotal  = total;
        appState.setState({ cloudLoading: false });
      } catch (err) {
        console.error('Error cargando nube:', err);
        appState.setState({ cloudLoading: false });
        alert('Error: ' + err.message);
      }
    }

    async function deleteCloudOrder(id) {
      if (!confirm('¿Eliminar esta ODS de la Nube? Esta acción no se puede deshacer.')) return;
      try {
        const res = await cloudFetch(`/rest/v1/ods?id=eq.${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(await res.text());
        showToast('🗑️ ODS eliminada de la Nube');
        await loadCloudOrders();
        render();
      } catch (err) {
        alert('Error al eliminar: ' + err.message);
      }
    }

    function openSupabaseView() {
      ensureSupaCreds();
      appState.setState({ view: 'supabase', cloudPage: 0, cloudSearch: '' });
      loadCloudOrders().then(() => render());
    }

    async function printCloudPDF_ODS(record) {
      showToast('⏳ Cargando imágenes desde la Nube…', '#3b82f6');

      // Convertir URL pública → base64 para jsPDF
      async function urlToBase64(url) {
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload  = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });
        } catch { return null; }
      }

      // Reconstruir objeto `order` compatible con generatePDF
      // Usar Map en memoria para no tocar localStorage (evita QuotaExceededError)
      window._tmpImgCache = new Map();
      const tmpImages = { inicial: [], mediciones: [], instalacion: [], extras: [] };

      for (const cat of ['inicial', 'mediciones', 'instalacion', 'extras']) {
        const items = record.imagenes?.[cat] || [];
        for (const item of items) {
          if (!item.url) continue;
          const b64 = await urlToBase64(item.url);
          if (!b64) continue;
          const tmpId = 'tmp_' + cat + '_' + item.orden + '_' + Date.now();
          window._tmpImgCache.set(tmpId, b64);   // solo en RAM, nunca en localStorage
          tmpImages[cat].push(tmpId);
        }
      }

      // Firmas
      let firmaCliente   = null;
      let firmaIngeniero = null;
      if (record.firma_cliente)    firmaCliente   = await urlToBase64(record.firma_cliente);
      if (record.firma_ingeniero)  firmaIngeniero = await urlToBase64(record.firma_ingeniero);

      // Mapear columnas snake_case → camelCase que usa generatePDF
      const order = {
        id:               record.id,
        numeroTicket:     record.numero_ticket     || '',
        fechaAtencion:    record.fecha_atencion    || '',
        fechaCreacion:    record.fecha_creacion    || '',
        ingeniero:        record.ingeniero         || '',
        tipoServicio:     record.tipo_servicio     || '',
        incidencia:       record.incidencia        || '',
        cliente:          record.cliente           || '',
        ubicacion:        record.ubicacion         || '',
        direccion:        record.direccion         || null,
        contacto:         record.contacto          || '',
        cargo:            record.cargo             || '',
        telefono:         record.telefono          || '',
        correo:           record.correo            || '',
        nombreTerminal:   record.nombre_terminal   || '',
        solicitaTerminal: record.solicita_terminal || false,
        modeloTerminal:   record.modelo_terminal   || '',
        serieRetirada:    record.serie_retirada    || '',
        macRetirada:      record.mac_retirada      || '',
        fallaRetirada:    record.falla_retirada    || '',
        serieInstalada:   record.serie_instalada   || '',
        macInstalada:     record.mac_instalada     || '',
        solucion:         record.solucion          || '',
        comentario:       record.comentario        || '',
        entregas:         record.entregas          || '',
        images:           tmpImages,
        firmaCliente,
        firmaIngeniero
      };

      generatePDF_ODS(order);
      // Liberar memoria del cache temporal
      window._tmpImgCache = new Map();
    }

    function renderSupabaseView() {
      const { cloudOrders, cloudLoading, cloudSearch, cloudPage, cloudPageSize, cloudTotal } = appState;
      const totalPages = Math.ceil(cloudTotal / cloudPageSize);
      const from = cloudPage * cloudPageSize + 1;
      const to   = Math.min((cloudPage + 1) * cloudPageSize, cloudTotal);

      return `
        <div style="min-height:100vh; background:#f9fafb; padding:24px;">
          <div style="max-width:1200px; margin:0 auto;">

            <!-- Header -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
              <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="appState.setState({view:'list'})" class="btn btn-secondary">← Local</button>
                <h1 style="font-size:24px; font-weight:bold; color:#1f2937; margin:0;">☁️ ODS en Storage</h1>
                ${cloudTotal > 0 ? `<span style="background:#e0e7ff; color:#4338ca; padding:4px 10px; border-radius:99px; font-size:13px; font-weight:600;">${cloudTotal} registros</span>` : ''}
              </div>
              <button onclick="loadCloudOrders().then(()=>render())" class="btn" style="background:#6366f1; color:white;">
                🔄 Recargar
              </button>
            </div>

            <!-- Buscador -->
            <div style="margin-bottom:16px; display:flex; gap:8px;">
              <input
                type="text"
                placeholder="Buscar por ticket, cliente o ingeniero…"
                value="${cloudSearch}"
                oninput="appState.cloudSearch=this.value"
                onkeydown="if(event.key==='Enter'){appState.cloudPage=0;loadCloudOrders().then(()=>render())}"
                class="input"
                style="flex:1; max-width:400px;"
              />
              <button onclick="appState.cloudPage=0;loadCloudOrders().then(()=>render())" class="btn btn-primary">🔍 Buscar</button>
              <button onclick="appState.cloudSearch='';appState.cloudPage=0;loadCloudOrders().then(()=>render())" class="btn btn-secondary">✕ Limpiar</button>
            </div>

            <!-- Tabla -->
            <div class="card" style="overflow-x:auto;">
              ${cloudLoading ? `
                <div style="text-align:center; padding:48px; color:#6b7280;">
                  <div style="font-size:32px; margin-bottom:8px;">⏳</div>
                  Cargando desde la Nube…
                </div>
              ` : cloudOrders.length === 0 ? `
                <div style="text-align:center; padding:48px; color:#6b7280;">
                  <div style="font-size:32px; margin-bottom:8px;">☁️</div>
                  No se encontraron registros
                </div>
              ` : `
                <table style="width:100%; border-collapse:collapse;">
                  <thead style="background:#f3f4f6;">
                    <tr>
                      <th style="padding:12px; text-align:left; font-size:13px; font-weight:600; color:#374151;">#️⃣ Ticket</th>
                      <th style="padding:12px; text-align:left; font-size:13px; font-weight:600; color:#374151;">🗓️ Fecha</th>
                      <th style="padding:12px; text-align:left; font-size:13px; font-weight:600; color:#374151;">👤 Cliente</th>
                      <th style="padding:12px; text-align:left; font-size:13px; font-weight:600; color:#374151;">🖥️ Terminal</th>
                      <th style="padding:12px; text-align:left; font-size:13px; font-weight:600; color:#374151;">👨‍💼 Ingeniero</th>
                      <th style="padding:12px; text-align:center; font-size:13px; font-weight:600; color:#374151;">📸</th>
                      <th style="padding:12px; text-align:center; font-size:13px; font-weight:600; color:#374151;">✍️</th>
                      <th style="padding:12px; text-align:right; font-size:13px; font-weight:600; color:#374151;">🛠️ Acciones</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${cloudOrders.map(r => `
                      <tr style="border-top:1px solid #e5e7eb; transition:background 0.15s;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
                        <td style="padding:12px; font-weight:600; color:#4338ca;">${r.numero_ticket || '-'}</td>
                        <td style="padding:12px; font-size:13px; color:#6b7280;">${r.fecha_atencion || '-'}</td>
                        <td style="padding:12px;">${r.cliente || '-'}</td>
                        <td style="padding:12px; font-size:13px;">${r.nombre_terminal || '-'}</td>
                        <td style="padding:12px; font-size:13px;">${r.ingeniero || '-'}</td>
                        <td style="padding:12px; text-align:center;">
                          <span style="background:#dbeafe; color:#1d4ed8; padding:2px 8px; border-radius:99px; font-size:12px; font-weight:600;">
                            ${r.total_imagenes || 0}
                          </span>
                        </td>
                        <td style="padding:12px; text-align:center; font-size:16px;">
                          ${r.tiene_firma_cliente ? '✅' : '❌'} ${r.tiene_firma_ingeniero ? '✅' : '❌'}
                        </td>
                        <td style="padding:12px; text-align:right; white-space:nowrap;">
                          <button onclick='showCloudDetail(${JSON.stringify(r).replace(/'/g, "\'")})'
                            class="btn" style="background:#8b5cf6; color:white; margin:0 2px; font-size:12px; padding:6px 10px;">
                            👁️
                          </button>
                          <button onclick='printCloudPDF_ODS(${JSON.stringify(r).replace(/'/g, "\'")})'
                            class="btn" style="background:#10b981; color:white; margin:0 2px; font-size:12px; padding:6px 10px;">
                            📄 ODS
                          </button>
                          <button onclick='printCloudPDF_IDT(${JSON.stringify(r).replace(/'/g, "\'")})'
                            class="btn" style="background:#10b981; color:white; margin:0 2px; font-size:12px; padding:6px 10px;">
                            📄 IDT
                          </button>
                          <button onclick='printCloudPDF_CDE(${JSON.stringify(r).replace(/'/g, "\'")})'
                            class="btn" style="background:#10b981; color:white; margin:0 2px; font-size:12px; padding:6px 10px;">
                            📄 CDE
                          </button>
                          <button onclick="deleteCloudOrder(${r.id})"
                            class="btn btn-danger" style="margin:0 2px; font-size:12px; padding:6px 10px;">
                            🗑️
                          </button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              `}
            </div>

            <!-- Paginación -->
            ${cloudTotal > cloudPageSize ? `
              <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:8px;">
                <span style="font-size:13px; color:#6b7280;">Mostrando ${from}–${to} de ${cloudTotal}</span>
                <div style="display:flex; gap:8px;">
                  <button
                    onclick="appState.cloudPage--;loadCloudOrders().then(()=>render())"
                    class="btn btn-secondary"
                    ${cloudPage === 0 ? 'disabled style="opacity:0.4;pointer-events:none;"' : ''}>
                    ← Anterior
                  </button>
                  <span style="padding:8px 12px; background:white; border:1px solid #e5e7eb; border-radius:6px; font-size:13px;">
                    Pág. ${cloudPage + 1} / ${totalPages}
                  </span>
                  <button
                    onclick="appState.cloudPage++;loadCloudOrders().then(()=>render())"
                    class="btn btn-secondary"
                    ${cloudPage >= totalPages - 1 ? 'disabled style="opacity:0.4;pointer-events:none;"' : ''}>
                    Siguiente →
                  </button>
                </div>
              </div>
            ` : ''}

          </div>
        </div>

        <!-- Modal detalle -->
        <div id="cloud-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto; padding:24px;">
          <div style="max-width:700px; margin:0 auto; background:white; border-radius:12px; padding:24px; position:relative;">
            <button onclick="document.getElementById('cloud-modal').style.display='none'"
              style="position:absolute; top:16px; right:16px; background:#f3f4f6; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:14px;">
              ✕ Cerrar
            </button>
            <div id="cloud-modal-content"></div>
          </div>
        </div>
      `;
    }

    function showCloudDetail(r) {
      const modal = document.getElementById('cloud-modal');
      const content = document.getElementById('cloud-modal-content');
      if (!modal || !content) return;

      const row = (label, val) => val
        ? `<tr><td style="padding:6px 12px 6px 0; font-weight:500; color:#6b7280; font-size:13px; white-space:nowrap;">${label}</td><td style="padding:6px 0; font-size:14px;">${val}</td></tr>`
        : '';

      const imgSection = (cat, label) => {
        const imgs = r.imagenes?.[cat] || [];
        if (!imgs.length) return '';
        return `
          <div style="margin-bottom:12px;">
            <p style="font-weight:600; font-size:13px; color:#374151; margin:0 0 6px;">${label} (${imgs.length})</p>
            <div style="display:flex; flex-wrap:wrap; gap:6px;">
              ${imgs.map(i => `<img src="${i.url}" style="width:100px; height:70px; object-fit:cover; border-radius:6px; border:1px solid #e5e7eb;" />`).join('')}
            </div>
          </div>`;
      };

      content.innerHTML = `
        <h2 style="font-size:20px; font-weight:bold; margin:0 0 4px;">ODS #${r.numero_ticket || r.id}</h2>
        <p style="color:#6b7280; font-size:13px; margin:0 0 20px;">Guardado: ${new Date(r.created_at).toLocaleString('es-MX')}</p>

        <table style="width:100%; margin-bottom:16px;">
          ${row('Fecha atención', r.fecha_atencion)}
          ${row('Ingeniero', r.ingeniero)}
          ${row('Tipo servicio', r.tipo_servicio)}
          ${row('Cliente', r.cliente)}
          ${row('Ubicación', r.ubicacion)}
          ${row('Dirección', r.direccion)}
          ${row('Contacto', r.contacto)}
          ${row('Cargo', r.cargo)}
          ${row('Teléfono', r.telefono)}
          ${row('Terminal', r.nombre_terminal)}
          ${row('Modelo', r.modelo_terminal)}
          ${row('Serie retirada', r.serie_retirada)}
          ${row('MAC retirada', r.mac_retirada)}
          ${row('Serie instalada', r.serie_instalada)}
          ${row('MAC instalada', r.mac_instalada)}
          ${row('Incidencia', r.incidencia)}
          ${row('Solución', r.solucion)}
          ${row('Entregas', r.entregas)}
          ${row('Comentario', r.comentario)}
        </table>

        <hr style="margin:16px 0; border-color:#e5e7eb;">
        <p style="font-weight:700; font-size:14px; margin:0 0 10px;">📸 Evidencias</p>
        ${imgSection('inicial', '🔍 Inicial')}
        ${imgSection('mediciones', '📏 Mediciones')}
        ${imgSection('instalacion', '🔧 Instalación')}
        ${imgSection('extras', '➕ Extras')}

        ${(r.firma_cliente || r.firma_ingeniero) ? `
          <hr style="margin:16px 0; border-color:#e5e7eb;">
          <p style="font-weight:700; font-size:14px; margin:0 0 10px;">✍️ Firmas</p>
          <div style="display:flex; gap:16px; flex-wrap:wrap;">
            ${r.firma_cliente    ? `<div><p style="font-size:12px; color:#6b7280; margin:0 0 4px;">Cliente</p><img src="${r.firma_cliente}"    style="height:60px; border:1px solid #e5e7eb; border-radius:6px;"/></div>` : ''}
            ${r.firma_ingeniero ? `<div><p style="font-size:12px; color:#6b7280; margin:0 0 4px;">Ingeniero</p><img src="${r.firma_ingeniero}" style="height:60px; border:1px solid #e5e7eb; border-radius:6px;"/></div>` : ''}
          </div>
        ` : ''}

        <div style="margin-top:20px; display:flex; gap:8px; justify-content:flex-end;">
          <button onclick="document.getElementById('cloud-modal').style.display='none'" class="btn btn-secondary">Cerrar</button>
          <button onclick='printCloudPDF(${JSON.stringify(r).replace(/'/g, "\'")});document.getElementById("cloud-modal").style.display="none"'
            class="btn" style="background:#10b981; color:white;">
            📄 Imprimir PDF
          </button>
        </div>
      `;
      modal.style.display = 'block';
    }

    // ==================== FIN SUPABASE CLOUD CRUD ====================
    // ==================== INICIALIZACIÓN ====================
    db.init();
    loadOrders();
    appState.subscribe(() => {
      render();
      if (appState.tab === 'firmas') {
        setTimeout(initSignature, 100);
      }
    });
    render();
  </script>
